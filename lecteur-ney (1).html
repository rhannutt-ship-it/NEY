<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Lecteur musical</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: radial-gradient(circle at 50% 0%, #1a3a2a 0%, #0a0a0a 60%);
  }
  .player {
    background: #121212;
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 720px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    position: relative;
  }
  .settings-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: transparent;
    border: none;
    color: #6a6a6a;
    cursor: pointer;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s;
  }
  .settings-btn:hover { color: #fff; }
  .brand-block { text-align: center; margin-bottom: 28px; }
  .brand-label {
    color: #b3b3b3;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.18em;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .brand-name {
    font-size: 72px;
    font-weight: 800;
    color: #1ed760;
    letter-spacing: -0.05em;
    line-height: 1;
    text-shadow: 0 0 60px rgba(30,215,96,0.2);
    word-break: break-word;
  }
  .frame-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
    margin-bottom: 18px;
  }
  #player-container, #player-container iframe {
    width: 100% !important;
    height: 100% !important;
    border: none;
  }
  .now-playing {
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 18px;
    font-size: 14px;
    color: #b3b3b3;
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 44px;
  }
  .pulse {
    width: 8px; height: 8px;
    background: #1ed760;
    border-radius: 50%;
    flex-shrink: 0;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .np-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
    font-size: 12px;
    color: #b3b3b3;
    font-variant-numeric: tabular-nums;
  }
  .progress-bar {
    flex: 1;
    height: 4px;
    background: #4d4d4d;
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    background: #1ed760;
    width: 0%;
    border-radius: 2px;
    transition: width 0.2s linear;
  }
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-bottom: 20px;
  }
  .btn {
    background: transparent;
    border: none;
    color: #b3b3b3;
    cursor: pointer;
    width: 42px; height: 42px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    padding: 0;
    transition: color 0.15s, transform 0.1s;
  }
  .btn:hover { color: #fff; }
  .btn:active { transform: scale(0.92); }
  .btn.on { color: #1ed760; }
  .btn-main {
    background: #fff;
    color: #000;
    width: 60px; height: 60px;
  }
  .btn-main:hover { background: #fff; color: #000; transform: scale(1.06); }
  .vol-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 8px;
    margin-bottom: 20px;
    justify-content: center;
  }
  .vol {
    -webkit-appearance: none;
    appearance: none;
    width: 160px;
    height: 4px;
    background: #4d4d4d;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .vol::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: #fff;
    border-radius: 50%;
    cursor: pointer;
    border: none;
  }
  .vol::-moz-range-thumb {
    width: 14px; height: 14px;
    background: #fff;
    border-radius: 50%;
    cursor: pointer;
    border: none;
  }
  .hints {
    color: #4a4a4a;
    font-size: 11px;
    text-align: center;
    margin-top: 12px;
    letter-spacing: 0.05em;
  }
  .hints kbd {
    background: rgba(255,255,255,0.1);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 10px;
    color: #b3b3b3;
    margin: 0 2px;
  }

  /* Modale configuration */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #1a1a1a;
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }
  .modal h2 {
    font-size: 22px;
    margin-bottom: 8px;
    color: #fff;
  }
  .modal p {
    color: #b3b3b3;
    font-size: 13px;
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .modal-field { margin-bottom: 18px; }
  .modal-field label {
    display: block;
    font-size: 12px;
    color: #b3b3b3;
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }
  .modal-field input {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border 0.15s, background 0.15s;
  }
  .modal-field input:focus {
    background: rgba(255,255,255,0.12);
    border-color: #1ed760;
  }
  .modal-field input::placeholder { color: #5a5a5a; }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }
  .modal-btn {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.1s, background 0.15s;
  }
  .modal-btn-primary { background: #1ed760; color: #000; }
  .modal-btn-primary:hover { background: #1fdf64; }
  .modal-btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
  .modal-btn-secondary:hover { background: rgba(255,255,255,0.15); }
  .modal-btn:active { transform: scale(0.97); }
</style>
</head>
<body>
  <div class="player">
    <button class="settings-btn" id="open-settings" title="Modifier ma config">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
    </button>

    <div class="brand-block">
      <p class="brand-label">Créé par</p>
      <h1 class="brand-name" id="brand-name">NEY</h1>
    </div>

    <div class="frame-wrap">
      <div id="player-container"></div>
    </div>

    <div class="now-playing">
      <span class="pulse"></span>
      <span class="np-text" id="np-text">Chargement de la playlist…</span>
    </div>

    <div class="progress-row">
      <span id="t-current">0:00</span>
      <div class="progress-bar" id="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span id="t-total">0:00</span>
    </div>

    <div class="controls">
      <button class="btn" id="b-shuffle" title="Aléatoire (S)">
        <svg width="22" height="22" viewBox="0 0 16 16" fill="currentColor"><path d="M13.151 1.5L11.78 2.872l1.121 1.121H10.41a3 3 0 00-2.4 1.2L4.81 9.491a1.5 1.5 0 01-1.2.6H1v1.5h2.61a3 3 0 002.4-1.2l3.2-4.298a1.5 1.5 0 011.2-.6h2.491l-1.121 1.121 1.371 1.372L17 4.157l-3.849-2.657zM3.61 4.5H1V6h2.61a1.5 1.5 0 011.2.6l.745 1.001 1.181-1.586-.726-.974a3 3 0 00-2.4-1.2v.659zm6.85 5.41l-.745-1-1.18 1.586.725.974a3 3 0 002.4 1.2h2.491l-1.121 1.121L13.4 14.7l3.85-3.857-3.85-2.657-1.371 1.372 1.121 1.121H10.41a1.5 1.5 0 01-1.2-.6l-.05-.067z"/></svg>
      </button>
      <button class="btn" id="b-prev" title="Précédent (←)">
        <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor"><path d="M3.3 1a.7.7 0 01.7.7v5.15l9.95-5.744a.7.7 0 011.05.606v12.575a.7.7 0 01-1.05.607L4 9.149V14.3a.7.7 0 01-.7.7H1.7a.7.7 0 01-.7-.7V1.7a.7.7 0 01.7-.7h1.6z"/></svg>
      </button>
      <button class="btn btn-main" id="b-play" title="Lecture / Pause (Espace)">
        <svg id="i-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7.05 3.606l13.49 7.788a.7.7 0 010 1.212L7.05 20.394A.7.7 0 016 19.788V4.212a.7.7 0 011.05-.606z"/></svg>
        <svg id="i-pause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M5.7 3a.7.7 0 00-.7.7v16.6a.7.7 0 00.7.7h2.6a.7.7 0 00.7-.7V3.7a.7.7 0 00-.7-.7H5.7zm10 0a.7.7 0 00-.7.7v16.6a.7.7 0 00.7.7h2.6a.7.7 0 00.7-.7V3.7a.7.7 0 00-.7-.7h-2.6z"/></svg>
      </button>
      <button class="btn" id="b-next" title="Suivant (→)">
        <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor"><path d="M12.7 1a.7.7 0 00-.7.7v5.15L2.05 1.107A.7.7 0 001 1.712v12.575a.7.7 0 001.05.607L12 9.149V14.3a.7.7 0 00.7.7h1.6a.7.7 0 00.7-.7V1.7a.7.7 0 00-.7-.7h-1.6z"/></svg>
      </button>
      <button class="btn" id="b-loop" title="Répéter (R)">
        <svg width="22" height="22" viewBox="0 0 16 16" fill="currentColor"><path d="M0 4.75A3.75 3.75 0 013.75 1h8.5A3.75 3.75 0 0116 4.75v5a3.75 3.75 0 01-3.75 3.75H9.81l1.018 1.018a.75.75 0 11-1.06 1.06L6.939 12.75l2.829-2.828a.75.75 0 011.06 1.06L9.811 12h2.439a2.25 2.25 0 002.25-2.25v-5a2.25 2.25 0 00-2.25-2.25h-8.5A2.25 2.25 0 001.5 4.75v5A2.25 2.25 0 003.75 12H5v1.5H3.75A3.75 3.75 0 010 9.75v-5z"/></svg>
      </button>
    </div>

    <div class="vol-row">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="#b3b3b3"><path d="M9.741.85a.75.75 0 01.375.65v13a.75.75 0 01-1.125.65l-6.925-4a3.642 3.642 0 01-1.33-4.967 3.639 3.639 0 011.33-1.332l6.925-4a.75.75 0 01.75 0z"/></svg>
      <input type="range" min="0" max="100" value="60" step="1" class="vol" id="vol">
    </div>

    <p class="hints">
      <kbd>Espace</kbd> Play/Pause &nbsp; <kbd>←</kbd><kbd>→</kbd> Navigation &nbsp; <kbd>S</kbd> Shuffle &nbsp; <kbd>R</kbd> Répéter
    </p>
  </div>

  <!-- Modale de configuration -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2>Configure ton lecteur</h2>
      <p>Entre ton nom (qui s'affichera en gros) et le lien de ta playlist YouTube. Tes réglages seront gardés sur ton navigateur.</p>

      <div class="modal-field">
        <label>Ton nom / pseudo</label>
        <input type="text" id="input-name" placeholder="NEY" maxlength="20">
      </div>

      <div class="modal-field">
        <label>Lien ou ID de playlist YouTube</label>
        <input type="text" id="input-playlist" placeholder="https://youtube.com/playlist?list=...">
      </div>

      <div class="modal-actions">
        <button class="modal-btn modal-btn-secondary" id="modal-cancel">Annuler</button>
        <button class="modal-btn modal-btn-primary" id="modal-save">Enregistrer</button>
      </div>
    </div>
  </div>

<script>
// Config par défaut (toi)
const DEFAULT_NAME = 'NEY';
const DEFAULT_PLAYLIST = 'PLu3R1l3zD8-8DBuAmlUWZxwD_AcnBfLt8';

// Lecture de la config sauvegardée (ou défauts)
function getConfig() {
  try {
    return {
      name: localStorage.getItem('ney_name') || DEFAULT_NAME,
      playlist: localStorage.getItem('ney_playlist') || DEFAULT_PLAYLIST
    };
  } catch(e) {
    return { name: DEFAULT_NAME, playlist: DEFAULT_PLAYLIST };
  }
}

function saveConfig(name, playlist) {
  try {
    localStorage.setItem('ney_name', name);
    localStorage.setItem('ney_playlist', playlist);
  } catch(e) {}
}

function extractPlaylistId(input) {
  if (!input) return null;
  input = input.trim();
  const match = input.match(/[?&]list=([a-zA-Z0-9_-]+)/);
  if (match) return match[1];
  if (/^[a-zA-Z0-9_-]+$/.test(input)) return input;
  return null;
}

// Appliquer le nom
const cfg = getConfig();
document.getElementById('brand-name').textContent = cfg.name;

// Premier lancement ? (aucune config sauvegardée)
let hasConfig = false;
try { hasConfig = !!localStorage.getItem('ney_name'); } catch(e) {}

if (!hasConfig) {
  // Ouvrir la modale au premier lancement
  setTimeout(() => openModal(true), 500);
}

let player;
let isPlaying = false;
let isShuffle = false;
let isLoop = false;
let progressInterval;

const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player-container', {
    width: '100%',
    height: '100%',
    playerVars: {
      'listType': 'playlist',
      'list': cfg.playlist,
      'controls': 1,
      'modestbranding': 1,
      'rel': 0,
      'iv_load_policy': 3,
      'playsinline': 1
    },
    events: {
      'onReady': onPlayerReady,
      'onStateChange': onPlayerStateChange,
      'onError': onPlayerError
    }
  });
}

function onPlayerReady(event) {
  player.setVolume(60);
  document.getElementById('np-text').textContent = 'Prêt — appuie sur lecture';
}

function onPlayerStateChange(event) {
  const state = event.data;
  isPlaying = state === YT.PlayerState.PLAYING;
  document.getElementById('i-play').style.display = isPlaying ? 'none' : 'block';
  document.getElementById('i-pause').style.display = isPlaying ? 'block' : 'none';

  if (state === 1 || state === 2) {
    try {
      const data = player.getVideoData();
      if (data && data.title) document.getElementById('np-text').textContent = data.title;
    } catch(e) {}
  }

  if (state === 1) startProgress();
  else stopProgress();
}

function onPlayerError(event) {
  // On ignore les erreurs bénignes et on saute à la vidéo suivante
  if (event.data === 100 || event.data === 101 || event.data === 150) {
    document.getElementById('np-text').textContent = 'Vidéo indisponible, passage à la suivante';
    setTimeout(() => { try { player.nextVideo(); } catch(e) {} }, 1500);
  }
  // Les autres erreurs (2, 5, 153) sont silencieuses maintenant
}

function startProgress() {
  stopProgress();
  progressInterval = setInterval(() => {
    if (!player || !player.getDuration) return;
    const cur = player.getCurrentTime();
    const tot = player.getDuration();
    if (tot > 0) {
      document.getElementById('progress-fill').style.width = (cur / tot * 100) + '%';
      document.getElementById('t-current').textContent = formatTime(cur);
      document.getElementById('t-total').textContent = formatTime(tot);
    }
  }, 500);
}

function stopProgress() {
  if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  s = Math.floor(s);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

// === Modale ===
function openModal(isFirstTime) {
  const modal = document.getElementById('modal');
  const c = getConfig();
  document.getElementById('input-name').value = isFirstTime ? '' : c.name;
  document.getElementById('input-playlist').value = isFirstTime ? '' : '';
  modal.classList.add('active');
  document.querySelector('.modal h2').textContent = isFirstTime ? 'Bienvenue !' : 'Tes réglages';
  document.querySelector('.modal p').textContent = isFirstTime
    ? 'Entre ton nom (qui s\'affichera en gros) et le lien de ta playlist YouTube. Tes réglages seront gardés sur ton navigateur.'
    : 'Modifie ton nom ou ta playlist. Laisse un champ vide pour le garder tel quel.';
  setTimeout(() => document.getElementById('input-name').focus(), 100);
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

document.getElementById('open-settings').addEventListener('click', () => openModal(false));
document.getElementById('modal-cancel').addEventListener('click', closeModal);

document.getElementById('modal-save').addEventListener('click', () => {
  const nameInput = document.getElementById('input-name').value.trim();
  const playlistInput = document.getElementById('input-playlist').value.trim();

  const current = getConfig();
  const newName = nameInput || current.name;
  let newPlaylist = current.playlist;

  if (playlistInput) {
    const id = extractPlaylistId(playlistInput);
    if (!id) {
      alert('Lien de playlist invalide. Copie bien l\'URL complète de la playlist YouTube.');
      return;
    }
    newPlaylist = id;
  }

  saveConfig(newName, newPlaylist);
  document.getElementById('brand-name').textContent = newName;

  if (newPlaylist !== current.playlist && player) {
    player.loadPlaylist({ list: newPlaylist, listType: 'playlist' });
    document.getElementById('np-text').textContent = 'Nouvelle playlist chargée';
  }

  closeModal();
});

// === Contrôles ===
document.getElementById('b-play').addEventListener('click', () => {
  if (!player) return;
  isPlaying ? player.pauseVideo() : player.playVideo();
});
document.getElementById('b-prev').addEventListener('click', () => { if (player) player.previousVideo(); });
document.getElementById('b-next').addEventListener('click', () => { if (player) player.nextVideo(); });
document.getElementById('b-shuffle').addEventListener('click', function() {
  if (!player) return;
  isShuffle = !isShuffle;
  player.setShuffle(isShuffle);
  this.classList.toggle('on', isShuffle);
});
document.getElementById('b-loop').addEventListener('click', function() {
  if (!player) return;
  isLoop = !isLoop;
  player.setLoop(isLoop);
  this.classList.toggle('on', isLoop);
});
document.getElementById('vol').addEventListener('input', (e) => {
  if (player) player.setVolume(parseInt(e.target.value));
});

document.getElementById('progress-bar').addEventListener('click', (e) => {
  if (!player || !player.getDuration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const dur = player.getDuration();
  if (dur > 0) player.seekTo(dur * pct, true);
});

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (document.getElementById('modal').classList.contains('active')) return;
  if (e.code === 'Space') { e.preventDefault(); document.getElementById('b-play').click(); }
  else if (e.code === 'ArrowLeft') document.getElementById('b-prev').click();
  else if (e.code === 'ArrowRight') document.getElementById('b-next').click();
  else if (e.code === 'KeyS') document.getElementById('b-shuffle').click();
  else if (e.code === 'KeyR') document.getElementById('b-loop').click();
});
</script>
</body>
</html>
